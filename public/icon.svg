<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2530"/>
      <stop offset="1" stop-color="#0c1014"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aa7ff"/>
      <stop offset="1" stop-color="#2f81f7"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8edf2"/>
      <stop offset="1" stop-color="#aab8c5"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- subtle glow behind the mark -->
  <circle cx="256" cy="248" r="170" fill="#2f81f7" opacity="0.12"/>

  <!-- dumbbell, tilted for energy -->
  <g transform="rotate(-30 256 256)">
    <!-- bar -->
    <rect x="118" y="238" width="276" height="36" rx="18" fill="url(#bar)"/>
    <!-- inner plates -->
    <rect x="138" y="172" width="44" height="168" rx="16" fill="url(#plate)"/>
    <rect x="330" y="172" width="44" height="168" rx="16" fill="url(#plate)"/>
    <!-- outer plates -->
    <rect x="92" y="196" width="38" height="120" rx="14" fill="url(#plate)"/>
    <rect x="382" y="196" width="38" height="120" rx="14" fill="url(#plate)"/>
    <!-- plate highlights -->
    <rect x="146" y="182" width="10" height="148" rx="5" fill="#ffffff" opacity="0.25"/>
    <rect x="338" y="182" width="10" height="148" rx="5" fill="#ffffff" opacity="0.25"/>
  </g>

  <!-- rising progress spark -->
  <path d="M120 408 L196 374 L264 392 L392 320" fill="none"
        stroke="#3fb950" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="392" cy="320" r="20" fill="#3fb950"/>
</svg>
